<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main">
        <section id="sidebar">
            <img src="./assets/insta_logo.svg" alt="insta_logo">
            <ul>
                <li><img src="./assets/home_icon.svg" alt="home_icon">Home</li>
                <li><img src="./assets/search_icon.svg" alt="search_icon">Search</li>
                <li><img src="./assets/explore_icon.svg" alt="explore_icon">Explore</li>
                <li><img src="./assets/reels_icon.svg" alt="reels_icon">Reels</li>
                <li><img src="./assets/message_icon.svg" alt="message_icon">Messages</li>
                <li><img src="./assets/heart_icon.svg" alt="heart_icon">Notifications</li>
                <li><img src="./assets/create.svg" alt="create_icon">Create</li>
                <li><img src="./assets/user_image.png" alt="user_image">Profile</li>
            </ul>
        </section>
        <section id="main-scrollable-container">
            Main Container
        </section>
    </div>
</body>
</html>
